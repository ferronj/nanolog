services:
  web:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - nanolog-data:/data
    environment:
      - DATABASE_URL=file:/data/nanolog.db
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    restart: unless-stopped

volumes:
  nanolog-data:
